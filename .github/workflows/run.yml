name: PredictLeads API Test

on:
  workflow_dispatch:

jobs:
  fetch-predictleads-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch PredictLeads jobs
        run: python fetch_predictleads_jobs.py
        env:
          PREDICTLEADS_API_KEY: ${{ secrets.PREDICTLEADS_API_KEY }}
          PREDICTLEADS_API_TOKEN: ${{ secrets.PREDICTLEADS_API_TOKEN }}

          DAYS_BACK: "7"
          PER_PAGE: "100"
          GLOBAL_LOCATION: "United Kingdom"

          FETCH_COMPANY_JOBS: "true"
          FETCH_GLOBAL_JOBS: "true"

          MAX_COMPANIES: "10"
          MAX_COMPANY_PAGES: "1"
          MAX_GLOBAL_PAGES: "1"

          MAX_COMPANY_JOBS: "10"
          MAX_GLOBAL_JOBS: "10"
          MAX_OUTPUT_ROWS: "20"

      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: predictleads-output
          path: output/
