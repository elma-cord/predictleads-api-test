name: Company Jobs Gemini Test

on:
  workflow_dispatch:

jobs:
  fetch-company-jobs-gemini:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch company jobs with Gemini
        run: python fetch_company_jobs_gemini.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"

          MAX_COMPANIES: "50"
          MAX_JOBS_OUTPUT: "2000"
          MAX_JOB_LINKS_PER_COMPANY: "50"

          REQUEST_TIMEOUT_SECONDS: "45"
          SLEEP_SECONDS: "1"

      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: gemini-company-jobs-output
          path: output/
